spring.application.name=springdeveloper
server.port=80

# ===============================
# MySQL 데이터베이스 설정
# ===============================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/cafe?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=1111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# MyBatis 설정
# ===============================
mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.type-aliases-package=ymsoft.springdeveloper.com.springdeveloper.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumOrdinalTypeHandler

# ===============================
# 로그 레벨 설정
# ===============================
logging.level.ymsoft.springdeveloper=INFO
logging.level.ymsoft.springdeveloper.com.springdeveloper.mapper=DEBUG
logging.level.org.mybatis=DEBUG
logging.level.java.sql=DEBUG
logging.level.java.sql.ResultSet=DEBUG
